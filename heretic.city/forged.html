<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>HXT — The Black Paper</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: radial-gradient(circle at top, #2a2a2a 0%, #0b0b0b 55%, #000 100%);
  font-family: Georgia, serif;
  color: #f4f1ea;
  min-height: 100vh;
  padding: 60px 20px;
}

/* ===== BLACK PAPER + SCANLINE ===== */
.black-paper {
  position: relative;
  max-width: 1000px;
  margin: 0 auto;
  padding: 70px;
  background: linear-gradient(145deg, #111, #0a0a0a);
  border-radius: 14px;
  border: 1px solid rgba(0,255,192,0.08);
  box-shadow:
    0 0 60px rgba(0,255,192,0.05),
    0 0 120px rgba(0,0,0,0.9);
  overflow: hidden;
}

.black-paper::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,192,0.03) 0px,
    rgba(0,255,192,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
  animation: scanMove 8s linear infinite;
  pointer-events: none;
}

@keyframes scanMove {
  from { transform: translateY(0); }
  to   { transform: translateY(40px); }
}

.section { margin-bottom: 100px; position: relative; z-index: 2; }

.module {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(0,255,192,0.12);
  padding: 24px;
  border-radius: 10px;
  margin: 30px 0;
  transition: 0.3s ease;
}

.module:hover {
  border-color: rgba(0,255,192,0.35);
  box-shadow: 0 0 30px rgba(0,255,192,0.08);
}

.token-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.token-card {
  background: rgba(0,255,192,0.05);
  padding: 20px;
  border-radius: 8px;
  border: 1px solid rgba(0,255,192,0.2);
}

h2 { margin-bottom: 20px; font-size: 1.6rem; color: #ff8c3c; }
h3 { margin-bottom: 12px; color: #00FFC0; }
p  { margin-bottom: 15px; line-height: 1.7; }

/* ===== CODE ===== */
pre {
  background: #0d1117;
  padding: 20px;
  border-radius: 8px;
  overflow-x: auto;
  border: 1px solid rgba(0,255,192,0.15);
}

code {
  color: #00FFC0;
  font-family: "Courier New", monospace;
  font-size: 0.95rem;
}

.inline-code {
  background: rgba(0,255,192,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: "Courier New", monospace;
  color: #00FFC0;
}

/* ===== SCROLL FORGE ===== */
.line {
  opacity: 0;
  transform: translateY(40px);
  filter: blur(8px);
  transition: 1.2s ease;
}

.line.reveal {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
  text-shadow:
    0 0 6px rgba(255,140,60,0.4),
    0 0 18px rgba(255,60,20,0.3);
}
</style>
</head>

<body>

<div class="black-paper">
  <div id="dynamic-sections"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  fetch('blackpaper.json')
    .then(res => res.json())
    .then(data => renderSections(data.sections))
    .catch(err => console.error("JSON Load Error:", err));

  function renderSections(sections) {

    const container = document.getElementById("dynamic-sections");

    sections.forEach(section => {

      const sectionDiv = document.createElement("div");
      sectionDiv.className = "section line";

      if (section.title) {
        const h2 = document.createElement("h2");
        h2.textContent = section.title;
        sectionDiv.appendChild(h2);
      }

      if (section.content) {
        renderText(section.content, sectionDiv);
      }

      if (section.modules) {
        section.modules.forEach(module => {

          if (module.type === "code-block") {
            const mod = document.createElement("div");
            mod.className = "module";

            const h3 = document.createElement("h3");
            h3.textContent = module.title;
            mod.appendChild(h3);

            const pre = document.createElement("pre");
            const code = document.createElement("code");
            code.textContent = module.code;
            pre.appendChild(code);

            mod.appendChild(pre);
            sectionDiv.appendChild(mod);
          }

          if (module.type === "routing-grid") {
            const mod = document.createElement("div");
            mod.className = "module";

            const h3 = document.createElement("h3");
            h3.textContent = module.title;
            mod.appendChild(h3);

            if (module.intro) renderText(module.intro, mod);

            const grid = document.createElement("div");
            grid.className = "token-grid";

            module.table.forEach(row => {
              const card = document.createElement("div");
              card.className = "token-card";
              card.innerHTML = `
                <h3>${row.method}</h3>
                <p><strong>Field:</strong> ${row.field}</p>
                <p><strong>Logic:</strong> ${row.logic}</p>
                <p><strong>User:</strong> ${row.user}</p>
              `;
              grid.appendChild(card);
            });

            mod.appendChild(grid);

            if (module.conclusion) renderText(module.conclusion, mod);

            sectionDiv.appendChild(mod);
          }

        });
      }

      if (section.tokenomics) {
        const supply = document.createElement("p");
        supply.innerHTML = "<strong>Total Supply:</strong> " + section.tokenomics.total_supply;
        sectionDiv.appendChild(supply);

        const grid = document.createElement("div");
        grid.className = "token-grid";

        section.tokenomics.distribution.forEach(item => {
          const card = document.createElement("div");
          card.className = "token-card";
          card.innerHTML = `
            <h3>${item.percent}%</h3>
            <p><strong>${item.label}</strong></p>
          `;
          grid.appendChild(card);
        });

        sectionDiv.appendChild(grid);

        if (section.tokenomics.additional_notes) {
          renderText(section.tokenomics.additional_notes, sectionDiv);
        }
      }

      if (section.conclusion) {
        renderText(section.conclusion, sectionDiv);
      }

      container.appendChild(sectionDiv);
    });

    initScrollForge();
  }

  function renderText(text, parent) {
    const paragraphs = text.split("\n\n");

    paragraphs.forEach(raw => {
      const p = document.createElement("p");

      // convert `inline code`
      const formatted = raw.replace(/`([^`]+)`/g,
        '<span class="inline-code">$1</span>'
      );

      p.innerHTML = formatted;
      parent.appendChild(p);
    });
  }

  function initScrollForge() {
    const lines = document.querySelectorAll(".line");

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("reveal");
        }
      });
    }, { threshold: 0.2 });

    lines.forEach(line => observer.observe(line));
  }

});
</script>

</body>
</html>
